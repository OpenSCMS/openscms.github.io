<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="OpenSCMS Blog - News and Updates">
    <title>Blog - OpenSCMS</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .under-construction {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
            padding: 2rem;
        }
        
        .under-construction h1 {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }
        
        .under-construction p {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
        
        .construction-icon {
            font-size: 4rem;
            margin-bottom: 2rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <!-- Header Component -->
    <div id="header-placeholder"></div>

    <main class="main-content">
        <div class="container">
            <div class="under-construction">
                <div class="construction-icon">🚧</div>
                <h1>Under Construction</h1>
                <p>Our blog is coming soon. Stay tuned for updates and insights about OpenSCMS!</p>
            </div>
        </div>
    </main>

    <!-- Footer Component -->
    <div id="footer-placeholder"></div>

    <!-- Component Loader -->
    <script src="../js/components.js"></script>
</body>
</html>
